name: Backend Quality

on:
  workflow_dispatch:
    inputs:
      run_lint:
        description: Rodar lint
        required: false
        default: true
        type: boolean
      run_typecheck:
        description: Rodar typecheck
        required: false
        default: true
        type: boolean
      run_tests:
        description: Rodar testes
        required: false
        default: true
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: strategiq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d strategiq_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/strategiq_test
      JWT_SECRET: github-actions-secret
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_CONSOLE_PORT: 9001
      MINIO_USE_SSL: false
      MINIO_ACCESS_KEY: strategiq
      MINIO_SECRET_KEY: strategiq123
      MINIO_BUCKET_NAME: evidences

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run lint
        if: ${{ inputs.run_lint }}
        run: bun run lint:ci

      - name: Run typecheck
        if: ${{ inputs.run_typecheck }}
        run: bun run typecheck

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: bun run test:run
