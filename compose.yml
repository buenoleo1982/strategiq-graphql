services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-strategiq
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: strategiq
      POSTGRES_PASSWORD: strategiq
      POSTGRES_DB: strategiq
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis-strategiq
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio-strategiq
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-strategiq}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-strategiq123}
    networks:
      - app-network

volumes:
  pg-data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  app-network:
    driver: bridge
